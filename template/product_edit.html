{% extends "base.html" %}
{% block content %}
<h1>Edit Product</h1>
<div class="card" style="max-width:480px">
  <form method="post" action="/products/{{ product.id }}/edit">
    <div class="form-row">
      <div class="form-group"><label>SKU</label><input name="sku" value="{{ product.sku }}" required></div>
      <div class="form-group"><label>Name</label><input name="name" value="{{ product.name }}" required></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Category</label>
        <select name="category" id="ep-category" onchange="updateBrandOptions('ep-category','ep-brand')">
          {% for key, label in category_labels.items() %}<option value="{{ key }}" {% if product.category==key %}selected{% endif %}>{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label>Brand</label>
        <select name="subcategory" id="ep-brand"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Cost</label><input name="cost" type="number" step="0.01" value="{{ product.cost }}"></div>
      <div class="form-group"><label>Price</label><input name="price" type="number" step="0.01" value="{{ product.price }}"></div>
      <div class="form-group"><label>Stock</label><input name="stock" type="number" value="{{ product.stock }}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Reorder At</label><input name="reorder_threshold" type="number" value="{{ product.reorder_threshold }}"></div>
      <div class="form-group"><label>Reorder Qty</label><input name="reorder_qty" type="number" value="{{ product.reorder_qty }}"></div>
    </div>
    <button class="btn-primary">Save Changes</button>
  </form>
</div>
<a href="/products">&larr; Back to products</a>

<script>
const CAT_SUBCATEGORIES = {{ cat_subcategories|tojson }};
function updateBrandOptions(catSelectId, brandSelectId, selected){
  const cat = document.getElementById(catSelectId).value;
  const brandSelect = document.getElementById(brandSelectId);
  const opts = CAT_SUBCATEGORIES[cat] || ['Generic'];
  brandSelect.innerHTML = opts.map(b => `<option value="${b}" ${b===selected?'selected':''}>${b}</option>`).join('');
}
updateBrandOptions('ep-category','ep-brand','{{ product.subcategory }}');
</script>
{% endblock %}
