{% extends "base.html" %}
{% block content %}
<h1>Staff</h1>

<div class="card">
  <h2>Add Staff Member</h2>
  <form method="post" action="/staff/add" class="form-row" style="align-items:flex-end">
    <div class="form-group"><label>Name</label><input name="name" required></div>
    <div class="form-group"><label>4-Digit PIN</label><input name="pin" maxlength="4" pattern="\d{4}" required></div>
    <div class="form-group"><label>Role</label>
      <select name="role">
        <option value="cashier">Cashier</option>
        <option value="technician">Technician</option>
        <option value="manager">Manager</option>
        <option value="owner">Owner</option>
      </select>
    </div>
    <button class="btn-primary">Add</button>
  </form>
</div>

<div class="card">
  <table>
    <thead><tr><th>Name</th><th>Role</th><th>Status</th><th>Change PIN</th><th></th></tr></thead>
    <tbody>
      {% for s in all_staff %}
      <tr>
        <td>{{ s.name }}</td>
        <td><span class="badge badge-gray">{{ s.role }}</span></td>
        <td>{% if s.active %}<span class="badge badge-green">Active</span>{% else %}<span class="badge badge-red">Disabled</span>{% endif %}</td>
        <td>
          <form method="post" action="/staff/{{ s.id }}/edit" style="display:flex;gap:6px">
            <input type="hidden" name="name" value="{{ s.name }}">
            <input type="hidden" name="role" value="{{ s.role }}">
            <input name="new_pin" maxlength="4" pattern="\d{4}" placeholder="New PIN" style="width:90px">
            <button class="btn-secondary btn-sm">Save</button>
          </form>
        </td>
        <td>
          <form method="post" action="/staff/{{ s.id }}/toggle">
            <button class="btn-secondary btn-sm">{{ 'Disable' if s.active else 'Enable' }}</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
